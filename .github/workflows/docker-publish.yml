name: Build and Push to DockerHub

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Check tag matches package.json version
        run: |
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$pkg_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "Tag v${{ steps.version.outputs.version }} does not match package.json version $pkg_version" >&2
            exit 1
          fi

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            itlostandfound/mcp-server-tasktracker:latest
            itlostandfound/mcp-server-tasktracker:${{ steps.version.outputs.version }}
            itlostandfound/mcp-server-tasktracker:${{ github.sha }}
